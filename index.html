<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 리포트</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      background:
        radial-gradient(circle at top left, #fff4d6 0, transparent 28%),
        linear-gradient(180deg, #f7f3ea 0%, #f2ede3 100%);
      color: #1f2937;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #ddd6c8;
      border-radius: 28px;
      padding: 44px;
      box-shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fef3c7;
      color: #b45309;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.2;
    }

    .lead {
      margin: 0 0 32px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      display: block;
      padding: 28px;
      border-radius: 20px;
      border: 1px solid #ddd6c8;
      background: #fff;
      text-decoration: none;
      color: inherit;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #e3c88d;
      background: #fff9ef;
    }

    .title {
      margin-bottom: 10px;
      font-size: 24px;
      font-weight: 800;
    }

    .desc {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 800px) {
      .wrap {
        padding: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Service Reports</div>
    <h1>서비스별로 리포트를 구분했습니다</h1>
    <p class="lead">
      앞으로 업데이트를 반복하기 쉽도록 리포트 진입 경로를 `황금거위`와 `모두의충전` 두 갈래로 분리했습니다.
    </p>

    <div class="grid">
      <a class="card" href="./golden-goose.html">
        <div class="title">황금거위</div>
        <div class="desc">광고 성과, 매출 시뮬레이션 등 황금거위 관련 리포트를 한 곳에서 볼 수 있습니다.</div>
      </a>

      <a class="card" href="./modu-charge.html">
        <div class="title">모두의충전</div>
        <div class="desc">상품권 전환, 월별 분석, 이코노믹스, 시뮬레이션 등 모두의충전 관련 리포트를 한 곳에서 관리합니다.</div>
      </a>
    </div>
  </main>
</body>
</html>

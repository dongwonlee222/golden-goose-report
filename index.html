<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>황금거위 리포트 허브</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background:
        radial-gradient(circle at top left, #fff4d6 0, transparent 28%),
        linear-gradient(180deg, #f7f3ea 0%, #f2ede3 100%);
      color: #1f2937;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .wrap {
      max-width: 880px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #ddd6c8;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 18px 50px rgba(31, 41, 55, 0.08);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fef3c7;
      color: #b45309;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }

    .lead {
      margin: 0 0 28px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      display: block;
      padding: 22px;
      border-radius: 18px;
      border: 1px solid #ddd6c8;
      background: #fff;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: #e3c88d;
      background: #fff9ef;
    }

    .card-disabled {
      cursor: not-allowed;
    }

    .title {
      margin-bottom: 8px;
      font-size: 20px;
      font-weight: 800;
    }

    .desc {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Golden Goose Reports</div>
    <h1>황금거위 리포트 허브</h1>
    <p class="lead">
      광고 성과 리포트와 매출 시뮬레이션을 각각 독립된 페이지로 관리할 수 있도록 정리한 시작 페이지입니다.
    </p>

    <div class="grid">
      <a class="card" href="./ad_revenue_performance_section.html">
        <div class="title">광고 성과 리포트</div>
        <div class="desc">광고 매출, 광고 유형별/네트워크별 성과, 유저 지표, 리텐션, OS/국가별 성과를 확인할 수 있습니다.</div>
      </a>

      <a class="card card-disabled" href="#"
         onclick="event.preventDefault(); alert('매출 시뮬레이션은 현재 준비중입니다.');">
        <div class="title">매출 시뮬레이션</div>
        <div class="desc">공격적 집행 기준 회원 확대 계획, 필요 예산, CAC 대비 D7/D30 Ads LTV 회수 구조를 준비중입니다.</div>
      </a>
    </div>
  </main>
</body>
</html>
